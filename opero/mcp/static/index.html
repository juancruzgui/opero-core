<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opero Core</title>
<style>
:root {
  --bg: #0a0a0b;
  --surface: #141416;
  --surface2: #1c1c1f;
  --border: #2a2a2e;
  --text: #e4e4e7;
  --text2: #a1a1aa;
  --accent: #8b5cf6;
  --accent2: #6d28d9;
  --todo: #3f3f46;
  --progress: #2563eb;
  --done: #16a34a;
  --blocked: #dc2626;
  --planning: #eab308;
  --font: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  font-size: 13px; line-height: 1.5; display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface);
}
.header h1 { font-size: 15px; font-weight: 600; color: var(--accent); }
.header .project-name { color: var(--text2); font-size: 12px; }
.header .status-bar { display: flex; gap: 16px; align-items: center; font-size: 11px; color: var(--text2); }
.claude-status {
  display: flex; align-items: center; gap: 6px; padding: 3px 10px;
  border-radius: 12px; font-size: 11px; font-weight: 600;
}
.claude-status.active { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.claude-status.inactive { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse 1.5s infinite; }
.pulse-dot.off { background: var(--text2); animation: none; }
@keyframes pulse {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(34,197,94,0.4); }
  50% { opacity:0.7; box-shadow:0 0 0 4px rgba(34,197,94,0); }
}

/* Layout */
.main { display: flex; flex: 1; overflow: hidden; }
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--surface); padding: 0 20px;
}
.tab {
  padding: 8px 16px; cursor: pointer; color: var(--text2);
  border-bottom: 2px solid transparent; font-size: 12px; transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Features Board */
.features-board { flex: 1; overflow-y: auto; padding: 16px 20px; }

.feature-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 16px; overflow: hidden;
}
.feature-header {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.feature-title { font-size: 14px; font-weight: 600; }
.feature-meta { display: flex; gap: 8px; align-items: center; }
.feature-status {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.feature-status.active { background: rgba(37,99,235,0.15); color: #60a5fa; border: 1px solid rgba(37,99,235,0.3); }
.feature-status.planning { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
.feature-status.done { background: rgba(22,163,74,0.15); color: #4ade80; border: 1px solid rgba(22,163,74,0.3); }
.feature-status.paused { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

.progress-bar {
  width: 120px; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
}
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.progress-text { font-size: 10px; color: var(--text2); min-width: 40px; text-align: right; }

.feature-tasks {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border-top: 1px solid var(--border);
}
.task-column {
  border-right: 1px solid var(--border); padding: 8px;
  min-height: 60px;
}
.task-column:last-child { border-right: none; }
.task-col-header {
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text2); margin-bottom: 6px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
}
.task-col-header.h-todo { border-bottom-color: var(--todo); }
.task-col-header.h-progress { border-bottom-color: var(--progress); }
.task-col-header.h-done { border-bottom-color: var(--done); }
.task-col-header.h-blocked { border-bottom-color: var(--blocked); }

/* Task card (compact) */
.card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
  padding: 7px 9px; margin-bottom: 5px; transition: border-color 0.15s;
}
.card:hover { border-color: var(--accent); }
.card .card-id { font-size: 8px; color: var(--text2); }
.card .card-title { font-size: 11px; font-weight: 500; margin: 2px 0; }
.card .card-meta { display: flex; gap: 4px; flex-wrap: wrap; }
.badge { font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: 500; }
.badge-type { background: var(--accent2); color: white; }
.badge-agent { background: #1e3a5f; color: #60a5fa; }
.badge-priority { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
.badge-priority.p1 { color: #ef4444; border-color: #ef4444; }
.badge-priority.p2 { color: #f97316; border-color: #f97316; }
.badge-feature { background: rgba(139,92,246,0.2); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }

/* Orphan tasks section */
.orphan-section {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; margin-bottom: 16px;
}
.orphan-section h3 {
  font-size: 12px; color: var(--text2); margin-bottom: 8px;
  font-weight: 600;
}
.orphan-tasks { display: flex; flex-wrap: wrap; gap: 6px; }

/* Kanban (flat view) */
.kanban {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  padding: 14px 20px; flex: 1; overflow: hidden;
}
.column {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  display: flex; flex-direction: column; overflow: hidden;
}
.column-header {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
}
.column-header .count { background: var(--surface2); padding: 1px 7px; border-radius: 10px; font-size: 10px; color: var(--text2); }
.column-body { padding: 6px; overflow-y: auto; flex: 1; }
.col-todo .column-header { border-left: 3px solid var(--todo); }
.col-progress .column-header { border-left: 3px solid var(--progress); }
.col-done .column-header { border-left: 3px solid var(--done); }
.col-blocked .column-header { border-left: 3px solid var(--blocked); }

/* Activity sidebar */
.activity-sidebar {
  width: 300px; border-left: 1px solid var(--border); background: var(--surface);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.sidebar-header {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text2);
  display: flex; justify-content: space-between; align-items: center;
}
.sidebar-body { flex: 1; overflow-y: auto; padding: 6px 0; }
.activity-item {
  padding: 5px 14px; font-size: 10px; border-bottom: 1px solid rgba(42,42,46,0.5);
  display: flex; gap: 6px; align-items: flex-start;
}
.activity-item.fresh { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { background: rgba(139,92,246,0.1); } to { background: transparent; } }
.act-time { color: var(--text2); font-size: 9px; min-width: 36px; }
.act-icon { font-size: 11px; min-width: 14px; text-align: center; }
.act-detail { color: var(--text2); word-break: break-all; flex: 1; }
.act-detail strong { color: var(--text); font-weight: 500; }

/* Agent Workbench */
.workbench { flex: 1; overflow-y: auto; padding: 14px 20px; }
.orchestrator-bar {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center;
  justify-content: space-between; gap: 16px;
}
.orchestrator-bar.hidden { display: none; }
.orch-phase {
  font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.orch-phase.planning { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
.orch-phase.development { background: rgba(37,99,235,0.15); color: #60a5fa; border: 1px solid rgba(37,99,235,0.3); }
.orch-phase.testing { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
.orch-phase.review { background: rgba(22,163,74,0.15); color: #4ade80; border: 1px solid rgba(22,163,74,0.3); }
.orch-meta { display: flex; gap: 16px; font-size: 11px; color: var(--text2); align-items: center; }
.orch-progress { display: flex; gap: 8px; align-items: center; }

.agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 16px; }
.agent-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px; position: relative; overflow: hidden;
}
.agent-card.working { border-color: rgba(34,197,94,0.4); }
.agent-card.orchestrator {
  border-color: var(--accent); background: linear-gradient(135deg, var(--surface) 0%, rgba(139,92,246,0.08) 100%);
  grid-column: 1 / -1;
}
.agent-card.orchestrator .agent-name { font-size: 15px; }
.agent-card.orchestrator .agent-status.working { background: rgba(139,92,246,0.2); color: var(--accent); border-color: var(--accent); }
.agent-card .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.agent-card .agent-name { font-size: 13px; font-weight: 600; color: var(--accent); }
.agent-card .agent-status {
  font-size: 9px; padding: 2px 6px; border-radius: 8px; font-weight: 600;
  text-transform: uppercase;
}
.agent-card .agent-status.working { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.agent-card .agent-status.idle { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.agent-card .agent-desc { font-size: 10px; color: var(--text2); margin-bottom: 8px; }
.agent-card .agent-task {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
  padding: 6px 8px; margin-bottom: 8px; font-size: 11px;
}
.agent-card .agent-task .task-label { color: var(--text2); font-size: 9px; }
.agent-card .agent-task .task-name { font-weight: 500; }
.agent-card .agent-stats { display: flex; gap: 12px; font-size: 10px; color: var(--text2); }
.agent-card .agent-stats .stat-val { font-weight: 600; color: var(--text); }
.agent-card .agent-caps { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }

/* Execution timeline */
.exec-timeline { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.exec-timeline-header {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2);
}
.exec-timeline-body { max-height: 250px; overflow-y: auto; }
.exec-item {
  display: flex; align-items: center; gap: 10px; padding: 7px 14px;
  font-size: 11px; border-bottom: 1px solid rgba(42,42,46,0.5);
}
.exec-item .exec-time { color: var(--text2); font-size: 9px; min-width: 40px; }
.exec-item .exec-agent { color: var(--accent); font-weight: 500; min-width: 90px; }
.exec-item .exec-task { flex: 1; color: var(--text); }
.exec-item .exec-result { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
.exec-item .exec-result.completed { background: rgba(22,163,74,0.15); color: #4ade80; }
.exec-item .exec-result.failed { background: rgba(220,38,38,0.15); color: #f87171; }
.exec-item .exec-result.running { background: rgba(37,99,235,0.15); color: #60a5fa; }
.memory-panel { padding: 14px 20px; overflow-y: auto; flex: 1; }
.search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.search-bar input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 10px; color: var(--text);
  font-family: var(--font); font-size: 12px; outline: none;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar button {
  background: var(--accent2); color: white; border: none; border-radius: 6px;
  padding: 7px 14px; cursor: pointer; font-family: var(--font); font-size: 12px;
}
.memory-list { display: flex; flex-direction: column; gap: 6px; }
.memory-item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
.memory-item .mem-header { display: flex; justify-content: space-between; align-items: center; }
.memory-item .mem-title { font-weight: 500; font-size: 12px; }
.memory-item .mem-content { font-size: 11px; color: var(--text2); margin-top: 3px; }
.memory-item .mem-tags { display: flex; gap: 3px; margin-top: 6px; }
.tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
/* Detail slide-over panel */
.detail-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 100;
}
.detail-overlay.open { display: block; }
.detail-panel {
  position: fixed; top: 0; right: -500px; width: 480px; height: 100vh;
  background: var(--bg); border-left: 1px solid var(--border);
  z-index: 101; display: flex; flex-direction: column;
  transition: right 0.2s ease;
}
.detail-panel.open { right: 0; }
.detail-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--surface);
}
.detail-title { font-size: 14px; font-weight: 600; }
.detail-close {
  background: none; border: 1px solid var(--border); color: var(--text2);
  width: 28px; height: 28px; border-radius: 4px; cursor: pointer;
  font-size: 12px; display: flex; align-items: center; justify-content: center;
}
.detail-close:hover { color: var(--text); border-color: var(--text2); }
.detail-body { flex: 1; overflow-y: auto; padding: 16px 18px; }

/* Timeline */
.timeline { position: relative; padding-left: 20px; }
.timeline::before {
  content: ''; position: absolute; left: 6px; top: 0; bottom: 0;
  width: 1px; background: var(--border);
}
.tl-item {
  position: relative; margin-bottom: 14px; padding-left: 14px;
}
.tl-item::before {
  content: ''; position: absolute; left: -17px; top: 4px;
  width: 9px; height: 9px; border-radius: 50%; border: 2px solid var(--border);
  background: var(--bg);
}
.tl-item.tl-commit::before { border-color: var(--done); background: var(--done); }
.tl-item.tl-memory::before { border-color: var(--accent); background: var(--accent); }
.tl-item.tl-activity::before { border-color: var(--progress); }
.tl-time { font-size: 9px; color: var(--text2); }
.tl-title { font-size: 12px; font-weight: 500; margin: 2px 0; }
.tl-content { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: pre-wrap; }
.tl-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }

.detail-section { margin-bottom: 16px; }
.detail-section h4 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text2); margin-bottom: 8px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.detail-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.detail-meta-item { font-size: 11px; color: var(--text2); }
.detail-meta-item strong { color: var(--text); }

/* Services bar */
.services-bar {
  display: flex; gap: 10px; padding: 6px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface); align-items: center;
}
.services-bar .svc-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-right: 4px; }
.svc-pill {
  display: flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 12px; font-size: 11px; border: 1px solid var(--border);
  background: var(--surface2); cursor: default;
}
.svc-pill.running { border-color: rgba(34,197,94,0.4); }
.svc-pill .svc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text2); }
.svc-pill.running .svc-dot { background: #22c55e; animation: pulse 1.5s infinite; }
.svc-pill a { color: var(--accent); text-decoration: none; font-size: 10px; }
.svc-pill a:hover { text-decoration: underline; }
.svc-btn {
  background: none; border: 1px solid var(--border); color: var(--text2);
  font-size: 9px; padding: 1px 6px; border-radius: 4px; cursor: pointer;
  font-family: var(--font);
}
.svc-btn:hover { color: var(--text); border-color: var(--text2); }
.svc-btn.stop { color: #f87171; border-color: rgba(220,38,38,0.3); }
.svc-btn.stop:hover { border-color: #f87171; }

.panel { display: none; flex: 1; overflow: hidden; }
.panel.active { display: flex; flex-direction: column; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>✦ Opero Core</h1>
    <span class="project-name" id="projectName">Loading...</span>
  </div>
  <div class="status-bar">
    <span id="gitBranch"></span>
    <span id="taskSummary"></span>
    <div class="claude-status inactive" id="claudeStatus">
      <div class="pulse-dot off" id="claudeDot"></div>
      <span id="claudeLabel">Claude idle</span>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-panel="features">Features</div>
  <div class="tab" data-panel="kanban">All Tasks</div>
  <div class="tab" data-panel="agents">Agents</div>
  <div class="tab" data-panel="memory">Memory</div>
</div>

<div class="services-bar" id="servicesBar">
  <span class="svc-label">Services</span>
  <div id="servicesPills"></div>
</div>

<div class="main">
  <!-- Features Board (primary view) -->
  <div id="features" class="panel active">
    <div class="features-board" id="featuresBoard"></div>
  </div>

  <!-- Flat Kanban -->
  <div id="kanban" class="panel">
    <div class="kanban">
      <div class="column col-todo">
        <div class="column-header">Todo <span class="count" id="countTodo">0</span></div>
        <div class="column-body" id="colTodo"></div>
      </div>
      <div class="column col-progress">
        <div class="column-header">In Progress <span class="count" id="countProgress">0</span></div>
        <div class="column-body" id="colProgress"></div>
      </div>
      <div class="column col-done">
        <div class="column-header">Done <span class="count" id="countDone">0</span></div>
        <div class="column-body" id="colDone"></div>
      </div>
      <div class="column col-blocked">
        <div class="column-header">Blocked <span class="count" id="countBlocked">0</span></div>
        <div class="column-body" id="colBlocked"></div>
      </div>
    </div>
  </div>

  <!-- Agents Workbench -->
  <div id="agents" class="panel">
    <div class="workbench">
      <div class="orchestrator-bar hidden" id="orchBar">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;font-weight:600">Orchestrator</span>
          <span class="orch-phase" id="orchPhase">—</span>
        </div>
        <div class="orch-meta">
          <span>Iteration <strong id="orchIteration">—</strong></span>
          <div class="orch-progress">
            <div class="progress-bar" style="width:160px"><div class="progress-fill" id="orchProgressFill" style="width:0%"></div></div>
            <span class="progress-text" id="orchProgressText">—</span>
          </div>
          <span id="orchTaskSummary"></span>
        </div>
      </div>
      <div class="agents-grid" id="agentsGrid"></div>
      <div class="exec-timeline" id="execTimeline">
        <div class="exec-timeline-header">Recent Executions</div>
        <div class="exec-timeline-body" id="execTimelineBody"></div>
      </div>
    </div>
  </div>

  <!-- Memory -->
  <div id="memory" class="panel">
    <div class="memory-panel">
      <div class="search-bar">
        <input type="text" id="memorySearch" placeholder="Search memory (semantic)..." />
        <button onclick="searchMemory()">Search</button>
      </div>
      <div class="memory-list" id="memoryList"></div>
    </div>
  </div>

  <!-- Detail Panel (slide-over) -->
  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <span class="detail-title" id="detailTitle">—</span>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <!-- Live Activity Sidebar -->
  <div class="activity-sidebar">
    <div class="sidebar-header">
      <span>Live Activity</span>
      <span id="activityCount" style="color:var(--text2)"></span>
    </div>
    <div class="sidebar-body" id="activityFeed"></div>
  </div>
</div>

<script>
const API = '';
let projectId = null;
let lastActivityId = 0;

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
    if (tab.dataset.panel === 'agents') loadAgents();
    if (tab.dataset.panel === 'memory') loadMemory();
    if (tab.dataset.panel === 'kanban') loadFlatKanban();
    if (tab.dataset.panel === 'features') loadFeatures();
  });
});

async function get(url) { return (await fetch(API + url)).json(); }
async function post(url, body) {
  return (await fetch(API + url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) })).json();
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function timeAgo(ds) {
  if (!ds) return '';
  const s = Math.floor((Date.now() - new Date(ds + (ds.includes('Z')?'':'Z')).getTime()) / 1000);
  if (s < 5) return 'now'; if (s < 60) return s+'s'; if (s < 3600) return Math.floor(s/60)+'m'; return Math.floor(s/3600)+'h';
}
function toolIcon(n) {
  return {'Edit':'✏️','Write':'📝','Bash':'⚡','Read':'📖','Grep':'🔍','Glob':'📁',
    'session':'🔵','git':'📦','task':'📋','feature':'🏗️','memory':'🧠','user':'👤'}[n]||'🔧';
}

function renderCard(task, showFeature) {
  const pc = task.priority <= 2 ? ` p${task.priority}` : '';
  const agent = task.assigned_agent ? `<span class="badge badge-agent">${task.assigned_agent}</span>` : '';
  const feat = showFeature && task._featureTitle ? `<span class="badge badge-feature">${esc(task._featureTitle)}</span>` : '';
  return `<div class="card" onclick="openTaskDetail('${task.id}')" style="cursor:pointer">
    <div class="card-id">${task.id}</div>
    <div class="card-title">${esc(task.title)}</div>
    <div class="card-meta">
      <span class="badge badge-type">${task.type}</span>
      <span class="badge badge-priority${pc}">P${task.priority}</span>
      ${agent}${feat}
    </div>
  </div>`;
}

function renderSmallCard(task) {
  const pc = task.priority <= 2 ? ` p${task.priority}` : '';
  return `<div class="card" onclick="openTaskDetail('${task.id}')" style="cursor:pointer">
    <div class="card-id">${task.id}</div>
    <div class="card-title">${esc(task.title)}</div>
    <div class="card-meta">
      <span class="badge badge-priority${pc}">P${task.priority}</span>
    </div>
  </div>`;
}

// Features board
async function loadFeatures() {
  if (!projectId) return;
  try {
    const data = await get(`/features/board/${projectId}`);
    const board = data.features || [];
    const container = document.getElementById('featuresBoard');

    // Also get orphan tasks (not in any feature)
    const allTasks = await get(`/tasks?project_id=${projectId}`);
    const featureTaskIds = new Set();
    board.forEach(b => b.tasks.forEach(t => featureTaskIds.add(t.id)));
    const orphans = (allTasks.tasks || []).filter(t => !featureTaskIds.has(t.id));

    let html = '';

    board.forEach(item => {
      const f = item.feature;
      const p = item.progress;
      const tasks = item.tasks;
      const buckets = { todo: [], in_progress: [], done: [], blocked: [] };
      tasks.forEach(t => { if (buckets[t.status]) buckets[t.status].push(t); });

      html += `<div class="feature-card">
        <div class="feature-header" onclick="openFeatureDetail('${f.id}')" style="cursor:pointer">
          <div>
            <span class="feature-title">${esc(f.title)}</span>
            ${f.description ? `<span style="color:var(--text2);font-size:11px;margin-left:8px">${esc(f.description)}</span>` : ''}
          </div>
          <div class="feature-meta">
            <span class="feature-status ${f.status}">${f.status}</span>
            <div class="progress-bar"><div class="progress-fill" style="width:${p.percent}%"></div></div>
            <span class="progress-text">${p.done}/${p.total}</span>
          </div>
        </div>
        <div class="feature-tasks">
          <div class="task-column">
            <div class="task-col-header h-todo">Todo (${buckets.todo.length})</div>
            ${buckets.todo.map(renderSmallCard).join('')}
          </div>
          <div class="task-column">
            <div class="task-col-header h-progress">In Progress (${buckets.in_progress.length})</div>
            ${buckets.in_progress.map(renderSmallCard).join('')}
          </div>
          <div class="task-column">
            <div class="task-col-header h-done">Done (${buckets.done.length})</div>
            ${buckets.done.map(renderSmallCard).join('')}
          </div>
          <div class="task-column">
            <div class="task-col-header h-blocked">Blocked (${buckets.blocked.length})</div>
            ${buckets.blocked.map(renderSmallCard).join('')}
          </div>
        </div>
      </div>`;
    });

    if (orphans.length > 0) {
      html += `<div class="orphan-section">
        <h3>Unassigned Tasks (${orphans.length})</h3>
        <div class="orphan-tasks">${orphans.map(t => renderCard(t, false)).join('')}</div>
      </div>`;
    }

    container.innerHTML = html;
  } catch(e) { console.error(e); }
}

// Flat kanban
async function loadFlatKanban() {
  try {
    const [taskData, featData] = await Promise.all([
      get('/tasks' + (projectId ? `?project_id=${projectId}` : '')),
      projectId ? get(`/features/${projectId}`) : {features:[]},
    ]);
    const tasks = taskData.tasks || [];
    const features = featData.features || [];
    const fmap = {};
    features.forEach(f => { fmap[f.id] = f.title; });
    tasks.forEach(t => { t._featureTitle = fmap[t.feature_id] || ''; });

    const b = { todo: [], in_progress: [], done: [], blocked: [] };
    tasks.forEach(t => { if (b[t.status]) b[t.status].push(t); });

    document.getElementById('colTodo').innerHTML = b.todo.map(t => renderCard(t,true)).join('');
    document.getElementById('colProgress').innerHTML = b.in_progress.map(t => renderCard(t,true)).join('');
    document.getElementById('colDone').innerHTML = b.done.map(t => renderCard(t,true)).join('');
    document.getElementById('colBlocked').innerHTML = b.blocked.map(t => renderCard(t,true)).join('');
    document.getElementById('countTodo').textContent = b.todo.length;
    document.getElementById('countProgress').textContent = b.in_progress.length;
    document.getElementById('countDone').textContent = b.done.length;
    document.getElementById('countBlocked').textContent = b.blocked.length;
  } catch(e) {}
}

async function loadStatus() {
  try {
    const data = await get('/project/status');
    if (!data.initialized) return;
    projectId = data.project.id;
    document.getElementById('projectName').textContent = `${data.project.name}`;
    document.getElementById('gitBranch').textContent = `${data.git.branch}${data.git.has_changes ? ' *' : ''}`;
    document.getElementById('taskSummary').textContent = `${data.tasks.todo}T ${data.tasks.in_progress}P ${data.tasks.done}D`;
  } catch(e) {}
}

async function loadClaudeStatus() {
  try {
    const data = await get('/claude/sessions');
    const active = (data.sessions||[]).find(s => s.status === 'active');
    const el = document.getElementById('claudeStatus');
    const dot = document.getElementById('claudeDot');
    const label = document.getElementById('claudeLabel');
    if (active) {
      el.className = 'claude-status active'; dot.className = 'pulse-dot';
      label.textContent = `Claude working${active.current_task_id ? ' on '+active.current_task_id : ''}`;
    } else {
      el.className = 'claude-status inactive'; dot.className = 'pulse-dot off';
      label.textContent = 'Claude idle';
    }
  } catch(e) {}
}

async function loadActivity() {
  try {
    const data = await get('/claude/activity?limit=80');
    const items = data.activity || [];
    const feed = document.getElementById('activityFeed');
    if (!items.length) {
      feed.innerHTML = '<div class="empty-state">No activity yet.<br>Start Claude Code.</div>';
      return;
    }
    const maxId = Math.max(...items.map(i => i.id||0));
    document.getElementById('activityCount').textContent = items.length;
    feed.innerHTML = items.map(item => {
      const isNew = item.id > lastActivityId && lastActivityId > 0;
      const icon = toolIcon(item.tool_name);
      let detail = '';
      if (['edit','write','read'].includes(item.action)) {
        detail = `<strong>${item.action}</strong> ${esc((item.file_path||'').split('/').pop())}`;
      } else if (item.action === 'bash') {
        detail = `<strong>$</strong> <code>${esc((item.detail||'').slice(0,60))}</code>`;
      } else if (item.action === 'commit') {
        detail = `<strong>commit</strong> ${esc(item.detail||'')}`;
      } else if (item.action === 'created' && item.tool_name === 'feature') {
        detail = `<strong>Feature created</strong> ${esc(item.detail||'')}`;
      } else if (item.action === 'updated' && item.tool_name === 'feature') {
        detail = `<strong>Feature updated</strong> ${esc(item.detail||'')}`;
      } else if (item.action === 'created' && item.tool_name === 'task') {
        detail = `<strong>Task created</strong> ${esc(item.detail||'')}`;
      } else if (item.action === 'updated' && item.tool_name === 'task') {
        detail = `<strong>Task updated</strong> ${esc(item.detail||'')}`;
      } else if (item.action === 'stored' && item.tool_name === 'memory') {
        detail = `<strong>Memory stored</strong> ${esc(item.detail||'')}`;
      } else if (item.action === 'prompt') {
        detail = `<strong>User:</strong> ${esc((item.detail||'').slice(0,80))}`;
      } else if (item.action === 'heartbeat') {
        return '';
      } else if (item.action === 'stop') {
        detail = '<strong>session ended</strong>';
      } else {
        detail = `<strong>${esc(item.tool_name)}.${esc(item.action)}</strong> ${esc(item.detail||'')}`;
      }
      const tb = item.task_id ? ` <span class="badge badge-agent">${item.task_id.slice(0,8)}</span>` : '';
      return `<div class="activity-item${isNew?' fresh':''}">
        <span class="act-time">${timeAgo(item.created_at)}</span>
        <span class="act-icon">${icon}</span>
        <span class="act-detail">${detail}${tb}</span>
      </div>`;
    }).filter(Boolean).join('');
    lastActivityId = maxId;
  } catch(e) {}
}

async function loadAgents() {
  try {
    const [wb, orch] = await Promise.all([
      get('/agents/workbench'),
      get('/orchestrator/status'),
    ]);

    // Orchestrator bar
    const orchBar = document.getElementById('orchBar');
    if (orch.run && orch.run.status === 'running') {
      orchBar.classList.remove('hidden');
      const phase = document.getElementById('orchPhase');
      phase.textContent = orch.run.phase;
      phase.className = 'orch-phase ' + orch.run.phase;
      document.getElementById('orchIteration').textContent = orch.run.iteration;
      const p = orch.progress || {};
      const total = p.total || 1;
      const pct = Math.round(((p.done||0) / total) * 100);
      document.getElementById('orchProgressFill').style.width = pct + '%';
      document.getElementById('orchProgressText').textContent = `${p.done||0}/${total}`;
      document.getElementById('orchTaskSummary').textContent =
        `${p.todo||0}T ${p.in_progress||0}P ${p.done||0}D ${p.blocked||0}B ${p.verified||0}V`;
    } else {
      orchBar.classList.add('hidden');
    }

    // Agent cards — orchestrator first, then rest
    const agents = wb.agents || [];
    agents.sort((a, b) => a.name === 'orchestrator' ? -1 : b.name === 'orchestrator' ? 1 : 0);
    document.getElementById('agentsGrid').innerHTML = agents.map(a => {
      const isOrch = a.name === 'orchestrator';
      const isWorking = a.status === 'working';
      const isActive = isWorking || (isOrch && a.last_activity && timeAgo(a.last_activity).match(/^(now|\d+s)$/));
      const caps = a.capabilities || [];
      let taskHtml = '';
      if (isWorking && a.current_task) {
        const elapsed = a.current_task.started_at
          ? timeAgo(a.current_task.started_at) : '';
        taskHtml = `<div class="agent-task">
          <div class="task-label">Working on ${elapsed ? '(' + elapsed + ')' : ''}</div>
          <div class="task-name">${esc(a.current_task.title || a.current_task.task_id)}</div>
          <div style="font-size:9px;color:var(--text2)">${a.current_task.task_id}</div>
        </div>`;
      }
      // For orchestrator, show the latest heartbeat message
      let statusMsg = '';
      if (isOrch && a.last_status_message) {
        statusMsg = `<div class="agent-task"><div class="task-name">${esc(a.last_status_message)}</div></div>`;
      }
      const cardClass = `agent-card${isActive ? ' working' : ''}${isOrch ? ' orchestrator' : ''}`;
      const statusLabel = isOrch
        ? (isActive ? '🧠 Active' : 'Offline')
        : (isWorking ? '● Working' : 'Idle');
      return `<div class="${cardClass}">
        <div class="agent-header">
          <span class="agent-name">${isOrch ? '🧠 ' : ''}${a.name}</span>
          <span class="agent-status ${isActive ? 'working' : 'idle'}">${statusLabel}</span>
        </div>
        <div class="agent-desc">${esc(a.description || '')}</div>
        ${statusMsg}${taskHtml}
        <div class="agent-stats">
          <span><span class="stat-val">${a.stats.completed}</span> done</span>
          <span><span class="stat-val">${a.stats.failed}</span> failed</span>
          ${a.last_activity ? `<span>last: ${timeAgo(a.last_activity)}</span>` : ''}
        </div>
        <div class="agent-caps">${caps.map(c=>`<span class="badge badge-type">${c}</span>`).join('')}</div>
      </div>`;
    }).join('');

    // Execution timeline
    const execs = wb.recent_executions || [];
    const tbody = document.getElementById('execTimelineBody');
    if (!execs.length) {
      tbody.innerHTML = '<div class="empty-state">No executions yet</div>';
    } else {
      tbody.innerHTML = execs.map(e => {
        const resultClass = e.status === 'completed' ? 'completed' : e.status === 'failed' ? 'failed' : 'running';
        return `<div class="exec-item">
          <span class="exec-time">${timeAgo(e.completed_at || e.started_at)}</span>
          <span class="exec-agent">${e.agent_name}</span>
          <span class="exec-task">${esc(e.task_title || e.task_id)}</span>
          <span class="exec-result ${resultClass}">${e.status}</span>
        </div>`;
      }).join('');
    }
  } catch(e) { console.error('workbench error', e); }
}

async function loadMemory() {
  if (!projectId) return;
  try {
    const data = await get(`/memory/list/${projectId}`);
    renderMemoryList(data.memories||[]);
  } catch(e) {}
}

function renderMemoryList(memories) {
  document.getElementById('memoryList').innerHTML = !memories.length
    ? '<div class="empty-state">No memories stored yet</div>'
    : memories.map(m => {
        const tags = JSON.parse(m.tags||'[]');
        return `<div class="memory-item">
          <div class="mem-header">
            <span class="mem-title">${esc(m.title)}</span>
            <div><span class="badge badge-type">${m.type}</span></div>
          </div>
          <div class="mem-content">${esc((m.content||'').slice(0,200))}</div>
          ${tags.length?`<div class="mem-tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
        </div>`;
      }).join('');
}

async function searchMemory() {
  const q = document.getElementById('memorySearch').value.trim();
  if (!q||!projectId) return;
  const data = await post('/memory/search',{project_id:projectId,query:q,top_k:20});
  renderMemoryList((data.results||[]).map(r=>r.memory));
}
document.getElementById('memorySearch').addEventListener('keydown',e=>{if(e.key==='Enter')searchMemory();});

// --- Detail panel ---
function openDetail() {
  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
}
function fmtTime(ds) {
  if (!ds) return '';
  try { return new Date(ds+(ds.includes('Z')?'':'Z')).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return ds; }
}

async function openTaskDetail(taskId) {
  document.getElementById('detailTitle').textContent = 'Loading...';
  document.getElementById('detailBody').innerHTML = '';
  openDetail();
  try {
    const data = await get(`/task/history/${taskId}`);
    const task = data.task;
    const tl = data.timeline || [];
    document.getElementById('detailTitle').textContent = task.title;
    let html = `<div class="detail-section"><div class="detail-meta">
      <div class="detail-meta-item"><strong>ID:</strong> ${task.id}</div>
      <div class="detail-meta-item"><strong>Status:</strong> ${task.status}</div>
      <div class="detail-meta-item"><strong>Type:</strong> ${task.type}</div>
      <div class="detail-meta-item"><strong>Priority:</strong> P${task.priority}</div>
      ${data.feature_id ? `<div class="detail-meta-item"><strong>Feature:</strong> <a href="#" onclick="openFeatureDetail('${data.feature_id}');return false" style="color:var(--accent)">${data.feature_id}</a></div>` : ''}
    </div></div>`;
    if (task.description) html += `<div class="detail-section"><h4>Description</h4><div style="font-size:12px;color:var(--text2)">${esc(task.description)}</div></div>`;
    if (task.success_criteria) html += `<div class="detail-section"><h4>Success Criteria</h4><div style="font-size:12px;color:var(--text2)">${esc(task.success_criteria)}</div></div>`;
    if (tl.length) {
      html += `<div class="detail-section"><h4>Timeline (${tl.length})</h4><div class="timeline">`;
      for (const item of tl) {
        if (item.type === 'commit') {
          html += `<div class="tl-item tl-commit"><div class="tl-time">${fmtTime(item.time)}</div><div class="tl-title">Commit <code>${(item.sha||'').slice(0,8)}</code></div><div class="tl-content">${esc(item.message||'')}</div></div>`;
        } else if (item.type === 'memory') {
          html += `<div class="tl-item tl-memory"><div class="tl-time">${fmtTime(item.time)} <span class="tl-badge badge-type">${item.memory_type||''}</span> <span class="tl-badge" style="background:var(--surface2);color:var(--text2)">${item.relationship||''}</span></div><div class="tl-title">${esc(item.title||'')}</div><div class="tl-content">${esc((item.content||'').slice(0,300))}</div></div>`;
        } else if (item.type === 'activity' && item.action !== 'heartbeat') {
          html += `<div class="tl-item tl-activity"><div class="tl-time">${fmtTime(item.time)}</div><div class="tl-title">${toolIcon(item.icon)} ${esc(item.action||'')} ${esc((item.file||'').split('/').pop())}</div>${item.detail?`<div class="tl-content">${esc(item.detail.slice(0,100))}</div>`:''}</div>`;
        }
      }
      html += '</div></div>';
    } else {
      html += '<div class="detail-section"><h4>Timeline</h4><div class="empty-state">No activity yet</div></div>';
    }
    document.getElementById('detailBody').innerHTML = html;
  } catch(e) { document.getElementById('detailBody').innerHTML = `<div class="empty-state">Error: ${e.message}</div>`; }
}

async function openFeatureDetail(featureId) {
  document.getElementById('detailTitle').textContent = 'Loading...';
  document.getElementById('detailBody').innerHTML = '';
  openDetail();
  try {
    const data = await get(`/feature/history/${featureId}`);
    const f = data.feature, p = data.progress, tasks = data.tasks || [];
    document.getElementById('detailTitle').textContent = f.title;
    let html = `<div class="detail-section"><div class="detail-meta">
      <div class="detail-meta-item"><strong>Status:</strong> ${f.status}</div>
      <div class="detail-meta-item"><strong>Progress:</strong> ${p.done}/${p.total} (${p.percent}%)</div>
    </div></div>`;
    if (f.description) html += `<div class="detail-section"><h4>Description</h4><div style="font-size:12px;color:var(--text2)">${esc(f.description)}</div></div>`;
    for (const td of tasks) {
      const t = td.task, mems = td.memories||[], commits = td.commits||[];
      const sc = {'done':'var(--done)','in_progress':'var(--progress)','blocked':'var(--blocked)'}[t.status]||'var(--text2)';
      html += `<div class="detail-section"><h4 style="cursor:pointer" onclick="openTaskDetail('${t.id}')"><span style="color:${sc}">●</span> ${esc(t.title)} [${t.status}]</h4>`;
      const items = [];
      commits.forEach(c => items.push({time:c.created_at,type:'commit',...c}));
      mems.forEach(m => items.push({time:m.created_at,type:'memory',...m}));
      items.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      if (items.length) {
        html += '<div class="timeline">';
        for (const item of items) {
          if (item.type==='commit') html += `<div class="tl-item tl-commit"><div class="tl-time">${fmtTime(item.time)}</div><div class="tl-title"><code>${(item.sha||'').slice(0,8)}</code> ${esc(item.message||'')}</div></div>`;
          else html += `<div class="tl-item tl-memory"><div class="tl-time">${fmtTime(item.time)} <span class="tl-badge badge-type">${item.type||''}</span></div><div class="tl-title">${esc(item.title||'')}</div><div class="tl-content">${esc((item.content||'').slice(0,200))}</div></div>`;
        }
        html += '</div>';
      } else html += '<div style="font-size:11px;color:var(--text2);padding:4px 0">No activity yet</div>';
      html += '</div>';
    }
    document.getElementById('detailBody').innerHTML = html;
  } catch(e) { document.getElementById('detailBody').innerHTML = `<div class="empty-state">Error: ${e.message}</div>`; }
}

// --- Services ---
async function loadServices() {
  try {
    const data = await get('/services');
    const svcs = data.services || [];
    document.getElementById('servicesPills').innerHTML = svcs.map(s => {
      const cls = s.running ? 'running' : '';
      const link = s.running ? `<a href="${s.url}" target="_blank">${s.url}</a>` : `port ${s.port}`;
      const btn = s.running
        ? `<button class="svc-btn stop" onclick="toggleService('${s.service}','stop')">Stop</button>`
        : `<button class="svc-btn" onclick="toggleService('${s.service}','start')">Start</button>`;
      return `<div class="svc-pill ${cls}">
        <span class="svc-dot"></span>
        <span>${s.icon} ${s.name}</span>
        <span style="font-size:10px;color:var(--text2)">${link}</span>
        ${btn}
      </div>`;
    }).join('');
  } catch(e) {}
}

async function toggleService(service, action) {
  try {
    await post(`/services/${service}/${action}`, {});
    await loadServices();
  } catch(e) { console.error(e); }
}

async function refresh() {
  await loadStatus();
  const active = document.querySelector('.tab.active')?.dataset.panel;
  if (active === 'features') await loadFeatures();
  if (active === 'kanban') await loadFlatKanban();
  await Promise.all([loadClaudeStatus(), loadActivity(), loadServices()]);
}

refresh();
setInterval(refresh, 2000);
</script>
